name: CI Performance - performance-test-automation

on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Amazon Corretto 17
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Configurar cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Build do projeto
        run: mvn clean compile

      - name: Executar teste de performance
        run: mvn exec:java -Dexec.mainClass="main.Main"

      - name: Verificar se o CSV foi gerado
        run: |
          if [ ! -f relatorio_performance.csv ]; then
            echo "Arquivo relatorio_performance.csv não encontrado"
            exit 1
          fi

      - name: Upload CSV como artefato
        uses: actions/upload-artifact@v4
        with:
          name: resultado-performance
          path: relatorio_performance.csv